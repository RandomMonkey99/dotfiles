$font = DepartureMono Nerd Font
$foreground = rgb(211, 198, 170)
$border_color = rgb(167, 192, 128)
$background = rgb(35, 40, 42)
# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/walls/streetlights.png
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 1
    vibrancy_darkness = 0.0
}

# GENERAL
general {

}


# Day
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A")"
    color = $foreground
    font_size = 90
    font_family = $font
    position = 0, 350
    halign = center
    valign = center
}

# Date-Month
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d %B")"
    color = $foreground
    font_size = 40
    font_family = $font
    position = 0, 250
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"- %I:%M -")</span>"
    color = $foreground
    font_size = 20
    font_family = $font
    position = 0, 190
    halign = center
    valign = center
}

# Profile-Photo
image {
    monitor =
    path = $HOME/.config/hypr/face.png
    border_size = 2
    border_color = $border_color
    size = 130
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 40
    halign = center
    valign = center
}



# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $border_color
    inner_color = $background
    font_color = $foreground
    fade_on_empty = true
    font_family = $font
    placeholder_text = <i><span foreground="##ffffff99">Enter Password</span></i>
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}

# Reboot
label {
    monitor =
    text = 󰜉⠀
    color = $foreground
    font_size = 40
    onclick = reboot now
    position = 0, 100
    halign = center
    valign = bottom
}

# Layout

label {
    monitor =
    text= $LAYOUT
    position = 800, -500
    font_family = $font
    color= $foreground
}

# Power off
label {
    monitor =
    text = 󰐥⠀
    color = $foreground
    font_size = 40
    onclick = shutdown now
    position = 820, 100
    halign =left 
    valign = bottom
}

# Suspend
label {
    monitor =
    text = 󰤄⠀
    color = $foreground
    font_size = 40
    onclick = systemctl suspend
    position = -820, 100
    halign = right
    valign = bottom
}